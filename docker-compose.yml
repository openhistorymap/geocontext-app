services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: geocontext-app:dev
    container_name: geocontext-app
    working_dir: /app
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - cargo_target:/app/src-tauri/target
      - cargo_registry:/usr/local/cargo/registry
      - cargo_git:/usr/local/cargo/git
    environment:
      # Vite/SvelteKit dev server bind
      HOST: 0.0.0.0
      # Tauri runtime hints (used when running `cargo tauri dev` inside the
      # container against an external X server)
      DISPLAY: ${DISPLAY:-:0}
      WEBKIT_DISABLE_COMPOSITING_MODE: "1"
    ports:
      - "1420:1420"
    stdin_open: true
    tty: true

volumes:
  node_modules:
  cargo_target:
  cargo_registry:
  cargo_git:
