name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag for the release (e.g. v0.1.0)'
        required: true

jobs:
  create-release:
    permissions:
      contents: write
    runs-on: ubuntu-24.04
    outputs:
      release_id: ${{ steps.create.outputs.result }}
    steps:
      - uses: actions/checkout@v4

      - name: create draft release
        id: create
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.payload.inputs?.tag || context.ref.replace('refs/tags/', '');
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `GeoContext Editor ${tag}`,
              body: [
                `Bundled artifacts for ${tag}.`,
                '',
                'Replace the placeholder icons in `src-tauri/icons/` with a real one',
                'before promoting this draft to a published release.'
              ].join('\n'),
              draft: true,
              prerelease: false
            });
            return data.id;

  build:
    needs: create-release
    permissions:
      contents: write
    name: ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { name: linux,   os: ubuntu-24.04,  args: '' }
          - { name: macos,   os: macos-latest,  args: '--target universal-apple-darwin' }
          - { name: windows, os: windows-latest, args: '' }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.name == 'macos' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: install Tauri system deps (Linux)
        if: matrix.platform.name == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev libssl-dev libgtk-3-dev librsvg2-dev \
            libayatana-appindicator3-dev \
            build-essential pkg-config

      - name: npm ci
        run: npm ci

      - name: generate placeholder icons
        run: node scripts/gen-icon.cjs

      - name: build and upload with tauri-action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.platform.args }}
